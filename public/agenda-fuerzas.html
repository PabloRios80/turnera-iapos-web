<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos Fuerzas de Seguridad - IAPOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f0f8ff; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #ffffff; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; width: 100%; border: 4px solid #dee2e6; overflow: hidden; }
        .highlight { color: #005A9C; font-weight: 700; }
        
        /* Encabezado sin márgenes negativos problemáticos */
        .header-banner { background-color: #1a202c; color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #005A9C; }
        .header-title { text-align: right; }
        .header-title h1 { font-family: 'Montserrat', sans-serif; font-size: 1.5em; font-weight: 700; margin: 0; }
        .header-banner img { height: 50px; }
        
        .main-content { padding: 30px; text-align: center; }
        h2 { color: #009A44; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 20px; }
        .intro-text { font-size: 1.1em; line-height: 1.6; margin-bottom: 20px; }
        
        .selector-container { background: #e6f7ff; padding: 20px; border-radius: 10px; margin: 20px auto; border: 2px solid #b3e0ff; max-width: 500px; }
        .city-selector { padding: 10px; width: 100%; border-radius: 5px; border: 2px solid #005A9C; font-weight: bold; color: #005A9C; font-size: 1.1em; cursor: pointer; }
        
        .cta-button { background-color: #009A44; color: white; border: none; border-radius: 50px; padding: 15px 30px; font-size: 1.2em; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 154, 68, 0.3); width: 100%; max-width: 400px; margin-top: 10px;}
        .cta-button:hover { transform: translateY(-3px); background-color: #007a36; }
        
        /* Calendario y Formulario */
        .calendario { margin-bottom: 20px; }
        .calendario h3 { text-transform: capitalize; color: #005A9C; }
        .calendario table { width: 100%; border-collapse: collapse; }
        .calendario th { padding: 10px; font-size: 0.9em; color: #666; }
        .calendario td { padding: 5px; text-align: center; }
        .dia-disponible { background-color: #005A9C; color: white; border: none; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; font-weight: bold;}
        .dia-disponible:hover { background-color: #00447e; transform: scale(1.1); }
        .dia-disponible.seleccionado { background-color: #009A44; outline: 2px solid #005A9C; }
        .dia-no-disponible { color: #ccc; display: inline-block; width: 40px; height: 40px; line-height: 40px; }
        .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .slot-button { background-color: #005A9C; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #formulario-reserva { background-color: #f8f9fa; padding: 25px; border-radius: 8px; margin-top: 20px; border: 1px solid #ddd; }
        #formulario-reserva input { width: calc(100% - 22px); padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em;}
        #formulario-reserva button { background-color: #009A44; color: white; padding: 15px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; width: 100%; font-weight: bold;}
        
        .hidden { display: none; }
        #loading { font-size: 1.2em; color: #005A9C; margin: 20px 0; font-weight: bold;}
        .success-box { background-color: #d4edda; color: #155724; padding: 20px; border-radius: 8px; margin-top: 20px; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header-banner">
            <img src="logo_iapos.png" alt="Logo IAPOS">
            <div class="header-title">
                <h1>Día Preventivo<br><small style="font-size: 0.7em; color: #b3e0ff;">Fuerzas de Seguridad</small></h1>
            </div>
        </header>
        
        <div class="main-content">
            <div id="intro-section">
                <p class="intro-text">Programa exclusivo para las Fuerzas de Seguridad.</p>
                
                <div class="selector-container">
                    <p style="font-weight: bold; margin-bottom: 10px;">1. Selecciona tu ciudad de atención:</p>
                    <select id="city-select-fuerzas" class="city-selector">
                        <option value="santafe">Santa Fe (San Martín 3145)</option>
                        <option value="rosario">Rosario (Entre Ríos 2857)</option>
                    </select>
                </div>

                <button id="show-turnera-btn" class="cta-button">Buscar Turnos</button>
            </div>

            <div id="turnera-wrapper" class="hidden">
                <h2 id="titulo-seleccion-dia">2. Selecciona un día</h2>
                <p>Mostrando turnos para <span id="sede-label" class="highlight"></span></p>
                
                <div id="loading" class="hidden">Buscando turnos...</div>
                <div id="calendarios-container"></div>
                
                <div id="horarios-container" class="hidden">
                    <h2>3. Selecciona un horario</h2>
                    <h3 id="titulo-horarios" style="color: #333;"></h3>
                    <div id="slots-disponibles" class="slots-grid"></div>
                </div>
                
                <div id="formulario-reserva" class="hidden">
                    <h2>4. Completa tus datos</h2>
                    <p id="turno-seleccionado-info" style="color: #005A9C; font-weight:bold;"></p>
                    <form id="booking-form">
                        <input type="hidden" id="slotId" name="slotId">
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre" required>
                        <input type="text" id="apellido" name="apellido" placeholder="Apellido" required>
                        <input type="text" id="dni" name="dni" placeholder="DNI (sin puntos)" required pattern="\d{7,8}">
                        <input type="email" id="email" name="email" placeholder="Email para confirmación" required>
                        <input type="tel" id="whatsapp" name="whatsapp" placeholder="Teléfono (ej: 3421234567)" required pattern="[0-9]{10}">
                        <button type="submit">Confirmar Turno</button>
                    </form>
                </div>
            </div>
            
            <div id="mensaje" class="hidden"></div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const introSection = document.getElementById('intro-section');
        const turneraWrapper = document.getElementById('turnera-wrapper');
        const showTurneraBtn = document.getElementById('show-turnera-btn');
        const loadingDiv = document.getElementById('loading');
        const calendariosContainer = document.getElementById('calendarios-container');
        const horariosContainer = document.getElementById('horarios-container');
        const slotsDisponiblesDiv = document.getElementById('slots-disponibles');
        const formContainer = document.getElementById('formulario-reserva');
        const bookingForm = document.getElementById('booking-form');
        const mensajeDiv = document.getElementById('mensaje');
        const citySelectFuerzas = document.getElementById('city-select-fuerzas');
        
        let turnosDisponibles = [];
        let ciudadSeleccionada = 'santafe'; 

        showTurneraBtn.addEventListener('click', () => {
            ciudadSeleccionada = citySelectFuerzas.value;
            document.getElementById('sede-label').textContent = ciudadSeleccionada === 'rosario' ? 'Rosario' : 'Santa Fe';
            introSection.classList.add('hidden');
            turneraWrapper.classList.remove('hidden');
            iniciarTurnera(ciudadSeleccionada);
        });

        // Autocompletar DNI
        const dniInput = bookingForm.querySelector('#dni');
        dniInput.addEventListener('blur', async () => {
            const dni = dniInput.value.trim();
            if (dni.length >= 7) {
                try {
                    const response = await fetch(`/api/usuario/${dni}`);
                    const result = await response.json();
                    if (result.status === 'success') {
                        if (confirm(`Encontramos datos para este DNI:\n${result.data.nombre} ${result.data.apellido}\n¿Desea autocompletarlos?`)) {
                            bookingForm.querySelector('#nombre').value = result.data.nombre || '';
                            bookingForm.querySelector('#apellido').value = result.data.apellido || '';
                            bookingForm.querySelector('#email').value = result.data.email || '';
                            bookingForm.querySelector('#whatsapp').value = result.data.telefono || '';
                        }
                    }
                } catch (e) {}
            }
        });

        function mostrarHorariosPara(fecha) {
            const turnosDelDia = turnosDisponibles.filter(slot => new Date(slot.time).toISOString().startsWith(fecha));
            let html = '';
            const fechaObj = new Date(fecha + 'T00:00:00');
            document.getElementById('titulo-horarios').textContent = fechaObj.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            turnosDelDia.forEach(slot => {
                const hora = new Date(slot.time).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', hour12: false });
                html += `<button class="slot-button" data-id="${slot.id}" data-info="${fechaObj.toLocaleDateString('es-AR')} a las ${hora} hs">${hora}</button>`;
            });
            slotsDisponiblesDiv.innerHTML = html;
            horariosContainer.classList.remove('hidden');
            formContainer.classList.add('hidden');
        }

        async function iniciarTurnera(ciudad) {
            loadingDiv.classList.remove('hidden');
            calendariosContainer.innerHTML = '';
            try {
                const response = await fetch(`/api/turnos?city=fuerzas&subcity=${ciudad}`);
                const data = await response.json();
                loadingDiv.classList.add('hidden');
                
                if (data.status === 'success' && data.slots.length > 0) {
                    turnosDisponibles = data.slots;
                    const diasConTurnos = new Set(turnosDisponibles.map(slot => new Date(slot.time).toISOString().split('T')[0]));
                    const hoy = new Date();
                    
                    for (let i = 0; i < 2; i++) {
                        const fecha = new Date(hoy.getFullYear(), hoy.getMonth() + i, 1);
                        const mes = fecha.getMonth();
                        const anio = fecha.getFullYear();
                        let calendarioHTML = `<div class="calendario"><h3>${fecha.toLocaleString('es-AR', { month: 'long', year: 'numeric' })}</h3><table><thead><tr><th>Dom</th><th>Lun</th><th>Mar</th><th>Mié</th><th>Jue</th><th>Vie</th><th>Sáb</th></tr></thead><tbody>`;
                        let primerDia = new Date(anio, mes, 1).getDay();
                        let diasEnMes = new Date(anio, mes + 1, 0).getDate();
                        let fechaCelda = 1;
                        
                        for (let j = 0; j < 6; j++) {
                            calendarioHTML += '<tr>';
                            for (let k = 0; k < 7; k++) {
                                if (j === 0 && k < primerDia || fechaCelda > diasEnMes) { calendarioHTML += '<td></td>'; } 
                                else {
                                    const fechaCompleta = `${anio}-${String(mes + 1).padStart(2, '0')}-${String(fechaCelda).padStart(2, '0')}`;
                                    const esHoy = new Date().toISOString().split('T')[0] === fechaCompleta;
                                    if (diasConTurnos.has(fechaCompleta)) {
                                        calendarioHTML += `<td><button class="dia-disponible ${esHoy ? 'hoy' : ''}" data-fecha="${fechaCompleta}">${fechaCelda}</button></td>`;
                                    } else {
                                        calendarioHTML += `<td><span class="dia-no-disponible ${esHoy ? 'hoy' : ''}">${fechaCelda}</span></td>`;
                                    }
                                    fechaCelda++;
                                }
                            }
                            calendarioHTML += '</tr>';
                            if (fechaCelda > diasEnMes) break;
                        }
                        calendarioHTML += '</tbody></table></div>';
                        calendariosContainer.innerHTML += calendarioHTML;
                    }
                } else {
                    calendariosContainer.innerHTML = '<p style="color:#666; font-size:1.1em; padding: 20px; background: #f8f9fa; border-radius: 8px;">No hay turnos disponibles para esta sede en este momento.</p>';
                }
            } catch (error) {
                loadingDiv.textContent = 'Error al cargar los turnos. Reintente más tarde.';
            }
        }
        
        calendariosContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('dia-disponible')) {
                mostrarHorariosPara(e.target.dataset.fecha);
                document.querySelectorAll('.dia-disponible').forEach(btn => btn.classList.remove('seleccionado'));
                e.target.classList.add('seleccionado');
                horariosContainer.scrollIntoView({ behavior: 'smooth' });
            }
        });
        
        slotsDisponiblesDiv.addEventListener('click', (e) => {
            if (e.target.classList.contains('slot-button')) {
                document.getElementById('slotId').value = e.target.dataset.id;
                document.getElementById('turno-seleccionado-info').textContent = e.target.dataset.info;
                formContainer.classList.remove('hidden');
                formContainer.scrollIntoView({ behavior: 'smooth' });
            }
        });

        bookingForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(bookingForm);
            const data = Object.fromEntries(formData.entries());
            
            data.city = 'fuerzas';
            data.ciudadFisica = ciudadSeleccionada; 

            const btn = bookingForm.querySelector('button');
            btn.disabled = true; btn.textContent = 'Confirmando...';

            try {
                const response = await fetch('/api/reservar', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
                });
                const result = await response.json();
if (result.status === 'success') {
                    turneraWrapper.classList.add('hidden');
                    mensajeDiv.classList.remove('hidden');
                    mensajeDiv.className = 'success-box'; // Usamos la clase de estilo que ya tienes
                    mensajeDiv.innerHTML = `
                        <h2 style="color: #155724; margin-top:0;">¡Turno confirmado con éxito!</h2>
                        <p>Hemos guardado tu turno y te enviaremos una confirmación por email.</p>
                        
                        <div style="background-color: #fff; border-left: 5px solid #005A9C; padding: 15px; text-align: left; margin: 20px 0; font-size: 0.95em;">
                            <h3 style="color: #DD6B20; margin-top:0; font-size: 1.1em;">INSTRUCCIONES IMPORTANTES:</h3>
                            <ul style="padding-left: 20px; line-height: 1.6;">
                                <li>Vení en <strong>AYUNO de al menos 12hs</strong>.</li>
                                <li>Si sos <strong>FUMADOR/A</strong>, no fumes al menos una hora antes.</li>
                                <li>Si usás <strong>lentes</strong>, traelos.</li>
                                <br>
                                <li><strong>Sede:</strong> ${ciudadSeleccionada.toUpperCase()}</li>
                                <li><strong>Dirección:</strong> ${ciudadSeleccionada === 'rosario' ? 'Entre Ríos 2857' : 'San Martín 3145'}</li>
                            </ul>
                        </div>

                        <div style="background-color: #fff9db; padding: 15px; border-radius: 8px; border: 1px solid #ffe066; margin-bottom: 20px;">
                            <p style="margin: 0; font-weight: bold; color: #856404;">PASO CRUCIAL ANTES DE IR:</p>
                            <p style="margin: 10px 0;">Para agilizar tu atención, es obligatorio completar tu Hoja de Vida Preventiva:</p>
                            <a href="https://hoja-de-vida-iapos.onrender.com" target="_blank" class="button-link" style="background-color: #005A9C; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">Completar Hoja de Vida</a>
                        </div>

                        <button onclick="window.location.reload()" style="background-color: #6c757d; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Salir / Nuevo Turno</button>
                    `;
                } else { throw new Error(result.message); }
            } catch (error) {
                alert('Error: ' + error.message);
                btn.disabled = false; btn.textContent = 'Confirmar Turno';
            }
        });
    });
    </script>
</body>
</html>
